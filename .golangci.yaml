run:
  concurrency: 4
  timeout: 5m

linters-settings:
  funlen:
    lines: 75
    statements: 50
  gocognit:
    min-complexity: 15
  gocyclo:
    min-complexity: 15
  revive:
    rules:
      - name: exported
        severity: warning
  lll:
    line-length: 132

linters:
  disable-all: true
  enable:
    # These are the default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused

    # These are some of the not enabled by default linters
    - bodyclose
    #- depguard
    #- dogsled
    #- dupl
    #- exhaustive
    - funlen
    #- gochecknoinits
    #- goconst
    - gocritic
    - gocognit
    - gocyclo
    - godot
    - gofmt
    #- goimports
    - revive
    #- gomnd
    #- goprintffuncname
    - gosec
    #- interfacer
    #- lll
    #- misspell
    #- nakedret
    - noctx
    #- nolintlint
    #- prealloc
    #- rowserrcheck
    - unconvert
    - unparam
    #- whitespace
